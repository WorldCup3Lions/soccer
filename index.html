<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UCL Draft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen active">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀</button>
    <div class="home-content">
      <div class="trophy-icon">🏆</div>
      <div class="home-title">UCL<br>DRAFT</div>
      <div class="home-sub">Build your dream Champions League squad</div>
      <div class="mode-buttons">
        <button class="mode-btn featured" onclick="startGame()">
          <span class="mode-label">11-A-SIDE</span>
          <span class="mode-desc">Full Squad · 5 UCL Trophies</span>
        </button>
      </div>
    </div>
  </div>

  <!-- DRAFT SCREEN -->
  <div id="screen-draft" class="screen">

    <!-- header: back | pick counter | reroll buttons -->
    <div class="draft-header">
      <button class="back-btn" onclick="goHome()">← BACK</button>
      <div class="pick-counter" id="pickCounter">Pick 1 of 11</div>
      <div class="header-rerolls">
        <button class="reroll-btn" id="rerollClubBtn" onclick="rerollClub()" disabled>↺ Club</button>
        <button class="reroll-btn" id="rerollEraBtn"  onclick="rerollEra()"  disabled>↺ Era</button>
      </div>
    </div>

    <!-- SPIN ZONE: two fixed-size boxes + one big SPIN button -->
    <div class="spin-zone">
      <div class="spin-boxes">
        <div class="spin-box-wrap">
          <div class="spin-box-label">CLUB</div>
          <div class="spin-box" id="spinClubBox">
            <div class="spin-box-value" id="spinClub">—</div>
          </div>
        </div>
        <div class="spin-box-wrap">
          <div class="spin-box-label">ERA</div>
          <div class="spin-box" id="spinEraBox">
            <div class="spin-box-value" id="spinEra">—</div>
          </div>
        </div>
      </div>
      <button class="spin-main-btn" id="spinBothBtn" onclick="spinBoth()">🔄 SPIN</button>
      <div class="current-combo-label" id="currentComboLabel"></div>
    </div>

    <!-- PLAYER CARDS -->
    <div class="players-zone">
      <div class="players-label" id="playersLabel">SPIN TO SEE PLAYERS</div>
      <div class="player-cards" id="playerCards"></div>
    </div>

    <!-- FORMATION BAR — always visible at bottom, slides up when player selected -->
    <div class="formation-bar" id="formationBar">
      <!-- Attack -->
      <div class="formation-row">
        <div class="slot" id="slot-LW"><span class="slot-pos">LW</span><span class="slot-name"></span></div>
        <div class="slot" id="slot-ST"><span class="slot-pos">ST</span><span class="slot-name"></span></div>
        <div class="slot" id="slot-RW"><span class="slot-pos">RW</span><span class="slot-name"></span></div>
      </div>
      <!-- Midfield -->
      <div class="formation-row">
        <div class="slot" id="slot-CDM"><span class="slot-pos">CDM</span><span class="slot-name"></span></div>
        <div class="slot" id="slot-CM"><span class="slot-pos">CM</span><span class="slot-name"></span></div>
        <div class="slot" id="slot-CAM"><span class="slot-pos">AM</span><span class="slot-name"></span></div>
      </div>
      <!-- Defence -->
      <div class="formation-row">
        <div class="slot" id="slot-LB"><span class="slot-pos">LB</span><span class="slot-name"></span></div>
        <div class="slot" id="slot-CB1"><span class="slot-pos">CB</span><span class="slot-name"></span></div>
        <div class="slot" id="slot-CB2"><span class="slot-pos">CB</span><span class="slot-name"></span></div>
        <div class="slot" id="slot-RB"><span class="slot-pos">RB</span><span class="slot-name"></span></div>
      </div>
      <!-- GK -->
      <div class="formation-row">
        <div class="slot" id="slot-GK"><span class="slot-pos">GK</span><span class="slot-name"></span></div>
      </div>
    </div>

    <!-- PLACEMENT POPUP — slides up over formation bar when player selected -->
    <div class="placement-popup" id="placementPopup">
      <div class="placement-popup-inner">
        <button class="placement-close" onclick="dismissPlacement()">✕</button>
        <div class="placement-player" id="placementPlayer"></div>
        <div class="placement-formation" id="placementFormation"></div>
        <div class="placement-hint">TAP A GLOWING SLOT</div>
      </div>
    </div>

  </div>

  <!-- RESULTS SCREEN -->
  <div id="screen-results" class="screen">
    <div class="results-header">
      <div class="results-title" id="resultsTitle">YOUR SQUAD</div>
      <div class="results-overall" id="resultsOverall">OVR 91</div>
    </div>

    <div class="ucl-run-section">
      <div class="ucl-run-label">UCL RESULTS — 5 SEASON RUN</div>
      <div class="ucl-trophies" id="uclTrophies"></div>
      <div class="ucl-summary" id="uclSummary"></div>
    </div>

    <div class="results-lineup" id="resultsLineup"></div>

    <div class="results-actions">
      <button class="share-btn" onclick="shareResult()">📋 COPY TO SHARE</button>
      <button class="play-again-btn" onclick="goHome()">PLAY AGAIN</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
